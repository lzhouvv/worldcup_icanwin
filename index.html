<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞彩分析 · 世界杯</title>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
    --border: #30363d; --text: #e6edf3; --text2: #8b949e;
    --accent: #d4ad4a; --win: #3fb950; --loss: #f85149;
    --draw: #d29922; --blue: #58a6ff;
    --shadow: 0 2px 12px rgba(0,0,0,.4); --radius: 10px;
  }
  html { font-size: 17px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC","Microsoft YaHei",sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px;
  }
  .container { max-width: 1460px; margin: 0 auto; }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 18px; margin-bottom: 14px;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  header h1 span { color: var(--accent); }
  header .sub { color: var(--text2); font-size: .75rem; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; font-size: .8rem;
    background: #1a2e1a; color: var(--win); border: 1px solid #2d6a2d;
  }
  .status-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--win); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .status-badge.loading { opacity: .6; }
  .status-badge.error { background: #3a1a1a; color: var(--loss); border-color: #6a2d2d; }
  .status-badge.error .dot { background: var(--loss); }

  .grid { display: grid; grid-template-columns: 3.5fr 3.5fr; gap: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface2); font-weight: 600; font-size: .9rem;
  }
  .card-header .badge {
    font-size: .7rem; font-weight: 400; background: #30363d;
    padding: 2px 10px; border-radius: 10px; color: var(--text2);
  }
  .card-body { padding: 12px 16px; }
  .card-body-sm { padding: 8px 16px; }

  .match-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
  .match-table th {
    text-align: left; padding: 7px 5px; border-bottom: 2px solid var(--border);
    color: var(--text2); font-weight: 500; font-size: .7rem; white-space: nowrap;
  }
  .match-table td { padding: 8px 5px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: .82rem; height: 38px; }
  .match-table tbody tr:last-child td { border-bottom: none; padding-bottom: 0; }
  .match-table tr:hover { background: rgba(88,166,255,.04); }
  .match-table tr.finished { opacity: .40; }
  .match-table tr.upcoming { opacity: .6; }
  .match-table tr.highlight { background: rgba(212,173,74,.06); }
  .match-table tr.selected { background: rgba(88,166,255,.08); }
  .team-name { font-weight: 600; display: flex; align-items: center; gap: 5px; color: inherit; }
  .team-name .flag { width: 18px; height: 13px; border-radius: 2px; flex-shrink: 0; }
  .vs { color: var(--text2); font-size: .7rem; text-align: center; }
  .time-col { color: var(--text2); font-size: .76rem; white-space: nowrap; }
  .odds-cell { text-align: center; }
  .odds-num {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: .8rem; font-weight: 600; color: var(--accent);
    background: rgba(212,173,74,.06);
  }
  .right-panel { position: sticky; top: 16px; align-self: start; }
  .odds-toggle {
    display: inline-flex; align-items: center; gap: 5px; cursor: pointer;
    font-size: .7rem; color: var(--text2); background: var(--surface2);
    border: 1px solid var(--border); padding: 3px 9px; border-radius: 12px;
    transition: all .15s; user-select: none;
  }
  .odds-toggle:hover { border-color: var(--accent); }
  .odds-toggle.off { opacity: .5; }
  .odds-toggle .indicator { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); transition: all .2s; }
  .odds-toggle.off .indicator { background: var(--text2); }

  /* Score display */
  .score-main { font-weight: 700; font-size: .9rem; }
  .score-ht { display: block; font-size: .62rem; color: var(--text2); margin-top: 1px; }
  .status-tag {
    display: inline-block; font-size: .6rem; padding: 1px 5px; border-radius: 3px;
    font-weight: 600; letter-spacing: .3px;
  }
  .status-tag.live { background: rgba(63,185,80,.15); color: var(--win); }
  .status-tag.ht   { background: rgba(210,153,34,.15); color: var(--draw); animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-tag.ft   { background: rgba(139,148,158,.15); color: var(--text2); }

  .bet-type-bar { display: flex; gap: 4px; margin: 8px 0 6px; flex-wrap: wrap; }
  .bet-type-btn {
    padding: 4px 11px; border-radius: 6px; font-size: .76rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); transition: all .15s; font-weight: 500;
  }
  .bet-type-btn:hover { border-color: var(--blue); color: var(--text); }
  .bet-type-btn.active { border-color: var(--accent); background: rgba(212,173,74,.12); color: var(--accent); }

  .bet-options { display: none; margin: 4px 0; }
  .bet-options.show { display: block; }
  .bet-opt-grid {
    display: flex; flex-wrap: wrap; gap: 3px;
    max-height: 145px; overflow-y: auto; padding: 3px 0;
  }
  .bet-opt-grid::-webkit-scrollbar { width: 4px; }
  .bet-opt-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .bet-opt-btn {
    padding: 3px 9px; border-radius: 5px; font-size: .74rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); transition: all .12s; font-weight: 500; white-space: nowrap;
  }
  .bet-opt-btn:hover { border-color: var(--blue); background: rgba(88,166,255,.08); }
  .bet-opt-btn.selected { border-color: var(--accent); background: rgba(212,173,74,.12); color: var(--accent); }

  .hc-bar { display: flex; gap: 3px; margin: 4px 0; flex-wrap: wrap; }
  .hc-btn {
    padding: 2px 9px; border-radius: 5px; font-size: .74rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); transition: all .12s;
  }
  .hc-btn:hover { border-color: var(--blue); color: var(--text); }
  .hc-btn.active { border-color: var(--accent); background: rgba(212,173,74,.12); color: var(--accent); }

  .bet-input-wrap { position: relative; }
  .bet-input-wrap input {
    width: 100%; padding: 8px 11px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: .86rem; outline: none; transition: border-color .2s;
  }
  .bet-input-wrap input:focus { border-color: var(--accent); }
  .bet-input-wrap input::placeholder { color: var(--text2); font-size: .8rem; }
  .bet-hint { font-size: .7rem; color: var(--text2); margin-top: 4px; line-height: 1.4; }
  .bet-hint kbd {
    display: inline-block; padding: 0 4px; border-radius: 3px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: .68rem; font-family: inherit; color: var(--text2);
  }
  /* Compact match list in bet panel */
  .match-list-compact { max-height: 260px; overflow-y: auto; margin: 6px 0 2px; }
  .match-list-compact::-webkit-scrollbar { width: 4px; }
  .match-list-compact::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .ml-item {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; cursor: pointer; border-radius: 5px;
    border: 1px solid transparent; margin-bottom: 2px;
    transition: all .12s; font-size: .8rem;
  }
  .ml-item:hover { background: var(--surface2); border-color: var(--border); }
  .ml-item.ml-selected { background: rgba(88,166,255,.08); border-color: var(--blue); }
  .ml-item.ml-hasbet { border-color: var(--accent); }
  .ml-item .ml-time { font-size: .65rem; color: var(--text2); width: 38px; flex-shrink: 0; }
  .ml-item .ml-teams { flex: 1; min-width: 0; display: flex; align-items: center; gap: 4px; }
  .ml-item .ml-teams .ml-team { font-weight: 600; font-size: .8rem; }
  .ml-item .ml-teams .ml-vs { color: var(--text2); font-size: .65rem; margin: 0 2px; }
  .ml-item .ml-score { font-size: .78rem; font-weight: 600; width: 32px; text-align: center; flex-shrink: 0; }
  .ml-item .ml-betdot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .ml-item .ml-arrow { color: var(--text2); font-size: .7rem; flex-shrink: 0; }
  .suggest-box {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 0 0 8px 8px; max-height: 170px; overflow-y: auto;
    display: none; box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }
  .suggest-box.show { display: block; }
  .suggest-item {
    padding: 6px 11px; cursor: pointer; font-size: .8rem;
    border-bottom: 1px solid var(--border); transition: background .1s;
  }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover, .suggest-item.active { background: var(--surface2); }

  .bet-slip-empty { text-align: center; padding: 14px; color: var(--text2); font-size: .83rem; }
  .bet-slip-empty .icon { font-size: 1.6rem; margin-bottom: 3px; opacity: .4; }
  .bet-item {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .8rem;
  }
  .bet-item:last-child { border-bottom: none; }
  .bet-item .match-info { flex: 1; min-width: 0; }
  .bet-item .match-info .teams { font-weight: 600; font-size: .78rem; }
  .bet-item .match-info .picks { font-size: .72rem; color: var(--accent); margin-top: 1px; display: flex; flex-wrap: wrap; gap: 3px; }
  .bet-item .match-info .picks .pick-tag {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    background: rgba(212,173,74,.1); font-size: .7rem;
  }
  .bet-item .del-btn {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: .95rem; padding: 2px 5px; border-radius: 4px; transition: .15s;
  }
  .bet-item .del-btn:hover { color: var(--loss); background: rgba(248,81,73,.1); }
  .bet-summary {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0 0; margin-top: 5px; border-top: 1px solid var(--border);
    font-size: .8rem;
  }
  .pass-group { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
  .pass-btn {
    padding: 3px 11px; border-radius: 6px; font-size: .76rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); transition: all .15s; font-weight: 500;
  }
  .pass-btn:hover { border-color: var(--blue); }
  .pass-btn.active { border-color: var(--accent); background: rgba(212,173,74,.12); color: var(--accent); }
  .pass-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* Stats for analysis panel - compact */
  .stats-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 6px; }
  .stat-card { background: var(--surface2); border-radius: 5px; padding: 7px 4px; text-align: center; border: 1px solid var(--border); }
  .stat-card .num { font-size: 1.15rem; font-weight: 700; line-height: 1.2; }
  .stat-card .num.green { color: var(--win); }
  .stat-card .num.red   { color: var(--loss); }
  .stat-card .num.gold  { color: var(--accent); }
  .stat-card .num.blue  { color: var(--blue); }
  .stat-card .num.white { color: var(--text); }
  .stat-card .label { font-size: .58rem; color: var(--text2); margin-top: 2px; white-space: nowrap; }

  .hitrate-ring { display: flex; align-items: center; gap: 20px; padding: 6px 0 10px; }
  .ring-container { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
  .ring-container svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-container .center-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-container .center-text .pct { font-size: 1.3rem; font-weight: 800; line-height: 1; }
  .ring-container .center-text .pct.green { color: var(--win); }
  .ring-container .center-text .pct.yellow{ color: var(--accent); }
  .ring-container .center-text .pct.red   { color: var(--loss); }
  .ring-container .center-text .sub { font-size: .58rem; color: var(--text2); margin-top: 2px; }

  .combo-list { max-height: 200px; overflow-y: auto; font-size: .76rem; }
  .combo-list::-webkit-scrollbar { width: 4px; }
  .combo-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .combo-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .74rem;
    border-radius: 3px;
  }
  .combo-row:last-child { border-bottom: none; }
  .combo-row.combo-hit { background: rgba(63,185,80,.06); }
  .combo-row.combo-miss { background: rgba(248,81,73,.04); }
  .combo-row.combo-wait { background: rgba(210,153,34,.04); }
  .combo-row .cr-info { flex: 1; min-width: 0; }
  .combo-row .cr-info .cr-picks { display: flex; flex-wrap: wrap; gap: 2px 6px; font-size: .74rem; }
  .combo-row .cr-info .cr-picks .cr-pick-correct { color: var(--win); font-weight: 600; }
  .combo-row .cr-info .cr-picks .cr-pick-wrong   { color: var(--loss); font-weight: 600; }
  .combo-row .cr-info .cr-picks .cr-pick-pending { color: var(--text2); }

  .btn-group { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .btn {
    padding: 6px 14px; border-radius: 6px; font-size: .8rem; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); transition: all .15s;
    background: var(--surface2); color: var(--text);
  }
  .btn:hover { border-color: var(--text2); }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary:hover { opacity: .9; }
  .btn-danger { color: var(--loss); border-color: var(--loss); background: transparent; }
  .btn-danger:hover { background: rgba(248,81,73,.1); }
  .btn-sm { padding: 4px 12px; font-size: .78rem; }

  .record-item {
    padding: 5px 0; margin: 0 8px; font-size: .78rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  .record-item.has-detail { padding-bottom: 0; }
  .record-item .ri-detail-box { margin: 4px 8px 0; padding: 4px 16px 12px; background: var(--surface2); border-radius: 6px; font-size: .74rem; border-bottom: 1px solid var(--border); width: 240px; box-sizing: border-box; }
  .record-item:last-child { border-bottom: none; }
  .record-item .ri-info { flex: 1; min-width: 0; padding-left: 12px; }
  .record-item .ri-info .ri-label { font-weight: 600; font-size: .8rem; }
  .record-item .ri-info .ri-detail { color: var(--text2); font-size: .7rem; margin-top: 1px; }
  .record-item .ri-actions { display: flex; gap: 3px; flex-shrink: 0; }

  .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
  .tab-item {
    padding: 6px 12px; cursor: pointer; font-size: .78rem; font-weight: 500;
    color: var(--text2); border-bottom: 2px solid transparent; transition: all .15s;
    background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab-item:hover { color: var(--text); }
  .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.show { display: block; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 20px; font-size: .84rem;
    box-shadow: 0 4px 24px rgba(0,0,0,.6); opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .table-wrap { overflow-x: auto; }
  .empty-pad { text-align: center; padding: 16px; color: var(--text2); font-size: .8rem; }

  .save-dialog-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100;
    display: none; align-items: center; justify-content: center;
  }
  .save-dialog-overlay.show { display: flex; }
  .save-dialog {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px; width: 340px; max-width: 90%;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  .save-dialog h3 { margin-bottom: 10px; font-size: .95rem; }
  .save-dialog input {
    width: 100%; padding: 7px 11px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: .84rem; outline: none;
  }
  .save-dialog input:focus { border-color: var(--accent); }

  .combo-badge {
    display: inline-block; padding: 1px 7px; border-radius: 8px;
    background: rgba(88,166,255,.12); color: var(--blue);
    font-size: .7rem; font-weight: 600;
  }

  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .right-panel { position: static; } .stats-grid { grid-template-columns: repeat(3,1fr); } }
  @media (max-width: 500px) { body { padding: 6px; } .card-body { padding: 8px; } .stats-grid { grid-template-columns: repeat(2,1fr); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .noscroll { overflow: hidden; }
</style>
</head>
<body>

<div class="container">

<header>
  <div>
    <h1>⚽ <span>世界杯</span>竞彩分析</h1>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span id="statusBadge" class="status-badge"><span class="dot"></span></span>
    <button class="btn btn-sm" onclick="exportData()" title="导出数据" style="font-size:.72rem;">⬆ 导出</button>
    <button class="btn btn-sm" onclick="document.getElementById('importFile').click()" title="导入数据" style="font-size:.72rem;">⬇ 导入</button>
    <input type="file" id="importFile" accept=".csv,.json" style="display:none" onchange="importData(event)">
    <button class="btn btn-sm" onclick="fetchData(currentDate)" style="font-size:.72rem;">⟳ 刷新</button>
  </div>
</header>

<div class="grid">

  <!-- ===== LEFT COLUMN ===== -->
  <div class="left-col">

    <!-- Match Table -->
    <div class="card">
      <div class="card-header">
        <span>🏆 世界杯赛程</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="display:flex;align-items:center;gap:4px;font-size:.72rem;">
            <button class="btn btn-sm" onclick="changeDate(-1)" style="padding:2px 5px;">‹</button>
            <span style="font-size:.78rem;font-weight:600;min-width:60px;text-align:center;" id="dateLabel"></span>
            <button class="btn btn-sm" onclick="changeDate(1)" style="padding:2px 5px;">›</button>
            <button class="btn btn-sm" onclick="goToToday()" style="padding:2px 5px;font-size:.6rem;">今天</button>
          </div>
          <span class="badge" id="matchCount">—</span>
          <div class="odds-toggle" id="oddsToggle" onclick="toggleOdds()">
            <span class="indicator"></span>
            <span id="oddsToggleLabel">赔率</span>
          </div>
        </div>
      </div>
      <div class="card-body" style="padding-bottom:16px;">
        <div class="table-wrap">
          <table class="match-table" id="matchTable">
            <thead>
              <tr>
                <th style="width:44px;padding-right:32px;">时间</th>
                <th style="width:36px;padding-right:32px;">组别</th>
                <th>主队</th>
                <th style="width:20px;text-align:center;padding-left:32px;padding-right:32px;font-size:0;">VS</th>
                <th style="padding-right:32px;">客队</th>
                <th style="width:44px;text-align:center;padding-right:32px;">比分</th>
                <th style="width:40px;text-align:center;">半场</th>
                <th style="width:32px;text-align:center;"></th>
                <th style="width:42px;text-align:center;" class="odds-th">胜</th>
                <th style="width:42px;text-align:center;" class="odds-th">平</th>
                <th style="width:42px;text-align:center;" class="odds-th">负</th>
              </tr>
            </thead>
            <tbody id="matchBody"></tbody>
          </table>
        </div>
        <div id="matchEmpty" class="empty-pad" style="display:none;">
          <div style="font-size:1.3rem;margin-bottom:4px;">🏆</div>
          <div id="matchEmptyMsg">加载比赛数据…</div>
        </div>
      </div>
    </div>

    <!-- Bet Input -->

function cnName(en) {
  if (!en) return en;
  if (TEAM_CN[en]) return TEAM_CN[en];
  // Try common abbreviations and suffixes
  const cleaned = en.replace(/^(FC|Club)\s*/i, '').replace(/\s*(FC|Club)$/i, '');
  if (TEAM_CN[cleaned]) return TEAM_CN[cleaned];
  // Try matching parts
  for (const p of en.split(/[\s,.-]+/)) {
    const key = p.trim();
    if (key && TEAM_CN[key]) return TEAM_CN[key];
  }
  // Try matching the full name case-insensitively
  const lower = en.toLowerCase();
  for (const [key, val] of Object.entries(TEAM_CN)) {
    if (key.toLowerCase() === lower) return val;
  }
  return en;
}

    dd.setUTCHours(parseInt(tm[1]) - parseInt(tm[3]), parseInt(tm[2]), 0, 0);
    return dd;
  }

  dd.setUTCHours(12, 0, 0, 0);

}

function importData(event) {

function getCombinations(betList, pass) {
  const groups = new Map();
  betList.forEach(b => { if (!groups.has(b.matchId)) groups.set(b.matchId, []); groups.get(b.matchId).push(b); });
  const mIds = [...groups.keys()];
  if (mIds.length === 0) return [];
  if (pass === 'single') return betList.map(b => [b]);
  const minM = pass === 'mixed' ? 2 : (parseInt(pass) || 2);
  if (mIds.length < minM) return [];
  function pick(idx, sel) {
    if (sel.length === minM) {
      let combos = [[]];
      sel.forEach(mid => {
        const opts = groups.get(mid);
        const next = [];
        combos.forEach(c => { opts.forEach(o => next.push([...c, o])); });
        combos = next;
      });
      return combos;
    }
    if (idx >= mIds.length) return [];
    return pick(idx+1, [...sel, mIds[idx]]).concat(pick(idx+1, sel));
  }
  return pick(0, []);
}

// Get effective scores: manual overrides API data
function getEffScores(mid) {
  const m = getMatch(mid);
  if (!m) return null;
  if (_manualScores[mid]) {
    const s = _manualScores[mid];
    const htR = s.htH > s.htA ? '3' : (s.htH < s.htA ? '0' : '1');
    const ftR = s.ftH > s.ftA ? '3' : (s.ftH < s.ftA ? '0' : '1');
    return { htResult: htR, result: ftR, htScoreStr: `${s.htH}-${s.htA}`, homeScore: String(s.ftH), awayScore: String(s.ftA), _manual: true, htH: s.htH, htA: s.htA };
  }
  // Compute result from scores when available (override API if incorrect)
  var sh = parseInt(m.homeScore), sa = parseInt(m.awayScore);
  var computedResult = (!isNaN(sh) && !isNaN(sa)) ? (sh > sa ? '3' : (sh < sa ? '0' : '1')) : m.result;
  var computedHtResult = m.htScoreStr ? (function() {
    var parts = m.htScoreStr.split('-');
    var hh = parseInt(parts[0]), ha = parseInt(parts[1]);
    return (!isNaN(hh) && !isNaN(ha)) ? (hh > ha ? '3' : (hh < ha ? '0' : '1')) : m.htResult;
  })() : m.htResult;
  return { htResult: computedHtResult, result: computedResult, htScoreStr: m.htScoreStr, homeScore: m.homeScore, awayScore: m.awayScore, _manual: false, htH: m.htScoreStr ? parseInt(m.htScoreStr.split('-')[0]) : null, htA: m.htScoreStr ? parseInt(m.htScoreStr.split('-')[1]) : null };
}

// OCR: Google Cloud Vision API (with Tesseract fallback)
var _ocrProvider = '';
var _ocrKey = '';
var _ocrSecret = '';
try { var p = localStorage.getItem('ocr_provider'); if (p) _ocrProvider = p; } catch(e) {}
try { var k = localStorage.getItem('ocr_key'); if (k) _ocrKey = k; } catch(e) {}
try { var s = localStorage.getItem('ocr_secret'); if (s) _ocrSecret = s; } catch(e) {}
function setupOCR() {
  var choice = prompt('选择 OCR 识别方式：\n1 - 百度 OCR（推荐，国内可用）\n2 - Google Cloud Vision\n3 - Tesseract.js（本地）\n0 - 取消', '1');
  if (choice === '1') {
    var key = prompt('请输入百度 OCR API Key：', _ocrKey || '');
    if (!key || !key.trim()) return;
    var secret = prompt('请输入百度 OCR Secret Key：', _ocrSecret || '');
    if (!secret || !secret.trim()) return;
    _ocrProvider = 'baidu'; _ocrKey = key.trim(); _ocrSecret = secret.trim();
    try { localStorage.setItem('ocr_provider', 'baidu'); localStorage.setItem('ocr_key', _ocrKey); localStorage.setItem('ocr_secret', _ocrSecret); } catch(e) {}
    showToast('百度 OCR 已设置', 1500);
  } else if (choice === '2') {
    var key = prompt('请输入 Google Cloud Vision API Key：', _ocrKey || '');
    if (key && key.trim()) { _ocrProvider = 'google'; _ocrKey = key.trim(); try { localStorage.setItem('ocr_provider', 'google'); localStorage.setItem('ocr_key', _ocrKey); } catch(e) {} showToast('Google Vision 已设置', 1500); }
  } else if (choice === '3') {
    _ocrProvider = 'tesseract'; try { localStorage.setItem('ocr_provider', 'tesseract'); } catch(e) {} showToast('Tesseract 已选择', 1500);
  }
}
// Quick-set Baidu OCR keys (call from console or use ⚙️ button)
function setBaiduKeys(apiKey, secretKey) {
  _ocrProvider = 'baidu'; _ocrKey = apiKey; _ocrSecret = secretKey;
  try { localStorage.setItem('ocr_provider', 'baidu'); localStorage.setItem('ocr_key', _ocrKey); localStorage.setItem('ocr_secret', _ocrSecret); } catch(e) {}
  showToast('百度 OCR 已配置', 1500);
}
function base64FromBlob(blob) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result.split(',')[1]); };
    reader.readAsDataURL(blob);
  });
}
async function ocrRecognize(event) {
  var file = event.target.files[0];
  if (!file) return;
  showToast('⏳ 正在识别...', 0);
  try {
    var imgFile = file;
    // HEIC conversion
    var ext = file.name.split('.').pop().toLowerCase();
    if ((ext === 'heic' || ext === 'heif') && typeof heic2any !== 'undefined') {
      showToast('⏳ 转换 HEIC...', 0);
      var blob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.8 });
      imgFile = new File([blob], 'image.jpg', { type: 'image/jpeg' });
    }
    var text = '';
    // Try API-based OCR first (may fail due to CORS - fallback to Tesseract)
    try {
      if (_ocrProvider === 'baidu' && _ocrKey && _ocrSecret) {
        showToast('⏳ 调用百度 OCR...', 0);
        var b64 = await base64FromBlob(imgFile);
        var tokenResp = await fetch('https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=' + encodeURIComponent(_ocrKey) + '&client_secret=' + encodeURIComponent(_ocrSecret));
        var tokenData = await tokenResp.json();
        var token = tokenData.access_token;
        if (!token) throw new Error(tokenData.error_description || '获取百度 token 失败');
        var ocrResp = await fetch('https://aip.baidubce.com/rest/2.0/ocr/v1/accurate?access_token=' + encodeURIComponent(token), {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'image=' + encodeURIComponent(b64)
        });
        var ocrResult = await ocrResp.json();
        if (ocrResult.words_result) {
          text = ocrResult.words_result.map(function(w) { return w.words; }).join('\n');
        } else {
          var basicResp = await fetch('https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic?access_token=' + encodeURIComponent(token), {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'image=' + encodeURIComponent(b64)
          });
          var basicResult = await basicResp.json();
          if (basicResult.words_result) text = basicResult.words_result.map(function(w) { return w.words; }).join('\n');
          else throw new Error(basicResult.error_msg || '百度OCR识别失败');
        }
      } else if (_ocrProvider === 'google' && _ocrKey) {
        showToast('⏳ 调用 Google Vision...', 0);
        var b64 = await base64FromBlob(imgFile);
        var resp = await fetch('https://vision.googleapis.com/v1/images:annotate?key=' + encodeURIComponent(_ocrKey), {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ requests: [{ image: { content: b64 }, features: [{ type: 'TEXT_DETECTION', maxResults: 1 }] }] })
        });
        var result = await resp.json();
        if (result.responses && result.responses[0] && result.responses[0].textAnnotations) text = result.responses[0].textAnnotations[0].description || '';
        else if (result.error) throw new Error(result.error.message);
      }
    } catch(e) {
      console.warn('API OCR failed:', e.message);
      showToast('⚠️ API OCR 失败，尝试本地识别...', 2000);
    }
    // Fallback to Tesseract
    if (!text && typeof Tesseract !== 'undefined') {
      showToast('⏳ Tesseract 识别中...', 0);
      var tessResult = await Tesseract.recognize(imgFile, 'chi_sim+eng');
      text = tessResult.data.text;
    } else {
      showToast('⚠️ 未设置 OCR，请点击设置', 2000);
    }
    if (text && text.trim().length >= 3) {
      showToast('✅ 识别到 ' + text.length + ' 字符', 1000);
      showOcrConfirm(text);
    } else {
      var manual = prompt('OCR 未能识别出有效文字。\n请手动粘贴投注内容：\n(可使用 📝 文本 按钮)');
      if (manual && manual.trim()) processImportedText(manual, '手动');
      else showToast('已取消', 1500);
    }
  } catch(e) {
    console.error('OCR error:', e);
    var manual = prompt('OCR 出错: ' + e.message + '\n\n请手动粘贴投注内容：');
    if (manual && manual.trim()) processImportedText(manual, '手动');
    else showToast('已取消', 1500);
  }
  event.target.value = '';
}

function parseOcrText(text) {
  let c = text.replace(/([^\x00-\x7f])\s+(?=[^\x00-\x7f])/g,'$1').replace(/千\s*队/g,'客队').replace(/主\s*队/g,'主队');
  const lines = c.split('\n').map(l=>l.trim()).filter(Boolean);
  const rec=[]; let b=[], pt='single', bt='spf';
  for (const l of lines) {
    if (/总进球/.test(l)) bt='zjq'; if (/让球/.test(l)) bt='rqspf';
    if (l.match(/(胜胜|胜平|胜负|平胜|平平|平负|负胜|负平|负负)/)) bt='bqc';
    const pm=l.match(/(?:过关方式)?\s*(\d+)\s*[xX×串]\s*(\d+)/); if(pm) pt=pm[1]+'x'+pm[2];
    if (/单关/.test(l)) pt='single'; if (/混合/.test(l)) pt='mixed';
    // Match team names, stop at score or end of available chars
    const m=l.match(/(?:主队[：:]\s*)?(.{2,15}?)\s*(?:VS|vs)\s*(.{2,15}?)(?:\s+\d+[:：]\d+|$)/);
    if (m && m[1].trim().length >= 2 && m[2].trim().length >= 2) {
      const h=m[1].replace(/^主队[：:]/,'').trim(), a=m[2].replace(/^客队[：:]/,'').trim();
      const pk=[]; const aft=l.slice(m.index+m[0].length);
    if (bt==='bqc') {
      const bp=aft.match(/(胜胜|胜平|胜负|平胜|平平|平负|负胜|负平|负负)/g);
      if (bp) bp.forEach(p=>pk.push({betType:'bqc',pick:{'胜胜':'33','胜平':'31','胜负':'30','平胜':'13','平平':'11','平负':'10','负胜':'03','负平':'01','负负':'00'}[p],label:{'胜胜':'胜-胜','胜平':'胜-平','胜负':'胜-负','平胜':'平-胜','平平':'平-平','平负':'平-负','负胜':'负-胜','负平':'负-平','负负':'负-负'}[p]}));
    } else if (bt==='zjq') { const g=l.match(/[（(](\d+)[）)]/); if(g) pk.push({betType:'zjq',pick:g[1],label:g[1]+'球'}); }
    else { for (const x of aft) { if(x==='胜') pk.push({betType:'spf',pick:'3',label:'胜'}); else if(x==='平') pk.push({betType:'spf',pick:'1',label:'平'}); else if(x==='负') pk.push({betType:'spf',pick:'0',label:'负'}); } }
    if (!pk.length) pk.push({betType:'spf',pick:'3',label:'胜'});
    const mid=findMatchByTeams(h,a);
    if (mid) {
      pk.forEach(p=>b.push({matchId:mid,...p,handicap:undefined,detail:BT[p.betType]?.label||'胜平负'}));
    } else {
      // Team not found in matches - still record with placeholder for later matching
      const placeholderId = 'team_' + h + '_' + a;
      pk.forEach(p=>b.push({matchId:placeholderId,...p,handicap:undefined,detail:BT[p.betType]?.label||'胜平负'}));
    }
    }
  }
  if (b.length) rec.push({bets:b,passType:pt,label:'导入 '+new Date().toLocaleString('zh-CN')});
  return rec;
}
function findMatchByTeams(home, away) {
  // Try exact home match first
  for (const m of matches) {
    const hMatch = home ? (m.home.includes(home) || home.includes(m.home) || (m.homeEn && m.homeEn.toLowerCase().includes(home.toLowerCase())) || (home.length > 1 && m.home.includes(home.slice(0,-1)))) : false;
    const aMatch = away ? (m.away.includes(away) || away.includes(m.away) || (m.awayEn && m.awayEn.toLowerCase().includes(away.toLowerCase())) || (away.length > 1 && m.away.includes(away.slice(0,-1)))) : false;
    if (home && away && hMatch && aMatch) return m.id;
  }
  // Try reversed
  for (const m of matches) {
    const hMatch = away ? (m.home.includes(away) || away.includes(m.home)) : false;
    const aMatch = home ? (m.away.includes(home) || home.includes(m.away)) : false;
    if (home && away && hMatch && aMatch) return m.id;
  }
  // Single team name search
  if (home && !away) {
    for (const m of matches) {
      if (m.home.includes(home) || home.includes(m.home) || m.away.includes(home) || home.includes(m.away)) return m.id;
    }
  }
  return null;
}

function calculateHitRate() {
  if (!bets.length) { showToast('请先添加投注'); return; }
  const combos = getCombinations(bets, passType);
  if (!combos.length) { showToast('所选场次不足', 1500); return; }
  const mIds = [...new Set(bets.map(b=>b.matchId))];
  const passOpt = PASS_OPTS.find(o => o.id === passType);
  if (passOpt && mIds.length < passOpt.min) { showToast(`${passOpt.label} 至少需 ${passOpt.min} 场`, 1500); return; }

  const evaluated = combos.map(combo => {
    const results = combo.map(b => {
      const m = getMatch(b.matchId); if (!m) return { label: b.label, status: 'pending' };
      const eff = getEffScores(b.matchId);
      const bt = BT[b.betType];
      let status = 'pending';
      const isResolved = eff._manual || (m.status === 'finished' && (b.betType !== 'bqc' || m.htScoreStr || m.htResult));
      if (isResolved) {
        if (eff.result === null) status = 'pending';
        else status = bt.hit(b.pick, eff.result, { ...m, ...eff }, b.handicap) ? 'correct' : 'wrong';
      }
      // For 半全场, add per-part status
      let parts = null;
      if (b.betType === 'bqc' && isResolved && eff.htResult && eff.result) {
        const p0 = b.pick[0], p1 = b.pick[1];
        parts = [
          { text: PICK_LABEL[p0]||p0, status: p0 === eff.htResult ? 'correct' : 'wrong' },
          { text: PICK_LABEL[p1]||p1, status: p1 === eff.result  ? 'correct' : 'wrong' },
        ];
      }
      return { match: m, label: `${m.home} ${b.label}`, status, parts };
    });
    const allC = results.every(r => r.status === 'correct');
    const anyW = results.some(r => r.status === 'wrong');
    return { combo: results, status: allC ? 'correct' : (anyW ? 'wrong' : 'pending') };
  });

  const total = evaluated.length, correct = evaluated.filter(e=>e.status==='correct').length;
  const wrong = evaluated.filter(e=>e.status==='wrong').length, pending = evaluated.filter(e=>e.status==='pending').length;
  const resolved = correct + wrong;
  const hitRate = resolved > 0 ? (correct / resolved * 100) : 0;

  analysisResult = { total, correct, wrong, pending, resolved, hitRate, evaluated };
  const badge = document.getElementById('analysisBadge');
  badge.textContent = `${correct}/${resolved} 命中`;
  badge.style.display = '';
  renderAnalysis();
  if (correct > 0) showToast(`🎉 ${correct}/${resolved} 注命中！`, 2000);
  else if (wrong > 0 && pending === 0) showToast(`😢 未命中`, 1500);
  else showToast(`📊 计算完成`, 1000);
}

function renderAnalysis() {
  const el = document.getElementById('tabAnalysis');
  if (!analysisResult) {
    el.innerHTML = `<div class="empty-pad"><div style="font-size:1.4rem;margin-bottom:4px;">📈</div><div>添加投注后点击「计算」</div></div>`;
    return;
  }
  const r = analysisResult;
  const pct = r.resolved > 0 ? (r.correct / r.resolved * 100) : 0;
  const radius = 38, circ = 2 * Math.PI * radius;
  const offset = circ - (pct / 100) * circ;
  const pctColor = pct >= 70 ? 'green' : (pct >= 40 ? 'yellow' : 'red');
  const maxShow = 30;
  const comboRows = r.evaluated.slice(0, maxShow).map(e => {
    const rowClass = e.status === 'correct' ? 'combo-hit' : (e.status === 'wrong' ? 'combo-miss' : 'combo-wait');
    const picksHtml = e.combo.map(p => {
      if (p.parts) return p.parts.map(pt => { const cls=pt.status==='correct'?'cr-pick-correct':(pt.status==='wrong'?'cr-pick-wrong':'cr-pick-pending'); return `<span class="${cls}">${pt.text}</span>`; }).join('<span style="color:var(--text2);margin:0 1px;">-</span>');
      const cls = p.status==='correct'?'cr-pick-correct':(p.status==='wrong'?'cr-pick-wrong':'cr-pick-pending');
      return `<span class="${cls}">${p.label}</span>`;
    }).join('');
    return `<div class="combo-row ${rowClass}"><span class="cr-info"><span class="cr-picks">${picksHtml}</span></span><span style="font-size:.72rem;font-weight:600;text-align:right;min-width:64px;color:${e.status==='correct'?'var(--win)':(e.status==='wrong'?'var(--loss)':'var(--text2)')};">${e.status==='correct'?'✓ 命中':(e.status==='wrong'?'✗ 未中':'⏳ 待定')}</span></div>`;
  }).join('');
  const more = r.evaluated.length > maxShow ? `<div style="text-align:center;color:var(--text2);font-size:.7rem;padding:3px 0;">… 还有 ${r.evaluated.length - maxShow} 注</div>` : '';

function calcRecordHitStatus(record) {
  const byMatch = new Map();
  record.bets.forEach(b => {if(!byMatch.has(b.matchId))byMatch.set(b.matchId,[]);byMatch.get(b.matchId).push(b);});
  const total = byMatch.size; let dead=0, resolved=0;
  byMatch.forEach((picks,mid) => {
    const eff = getEffScores(mid);
    var m = getMatch(mid) || {};
    var isFinished = (m.status === 'finished' && eff.result !== null) || eff._manual;
    if (!eff || !isFinished) return;
    resolved++;
    const ok = picks.some(b => { const bt=BT[b.betType]; return bt ? bt.hit(b.pick, eff.result, {...m, ...eff}, b.handicap) : false; });
    if (!ok) dead++;
  });
  let need = total;
  if (record.passType !== 'single' && record.passType !== 'mixed') { const n=parseInt(record.passType); if(!isNaN(n)) need=n; }
  // 单关: 只要有任意一场命中就算中
  if (record.passType === 'single') {
    if (resolved === 0) return null;
    if (dead < resolved) return 'correct'; // 至少一场命中
    if (dead === resolved && resolved === total) return 'wrong'; // 全部结束且无一命中
    return null;
  }
  if (resolved === 0) return null;
  if (total - dead < need) return 'wrong';
  if (resolved === total) return 'correct';
  return null;
}

function fmtDateKey(d) {
  var f = new Intl.DateTimeFormat('en', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
  var p = f.formatToParts(d);
  var get = function(t) { return p.find(function(x) { return x.type === t; })?.value || '00'; };
  var h = parseInt(get('hour')), mi = parseInt(get('minute'));
  if (h === 12 && mi === 0) { var dd = new Date(d); dd.setUTCHours(dd.getUTCHours()-12); dd.setUTCMinutes(dd.getUTCMinutes()-1); var p2 = new Intl.DateTimeFormat('en',{timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(dd); var g2=t=>p2.find(x=>x.type===t)?.value||'00'; return g2('year')+'-'+g2('month')+'-'+g2('day'); }
  if (h === 23 && mi === 59) { var dd2 = new Date(d); dd2.setUTCDate(dd2.getUTCDate()-1); var p3 = new Intl.DateTimeFormat('en',{timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(dd2); var g3=t=>p3.find(x=>x.type===t)?.value||'00'; return g3('year')+'-'+g3('month')+'-'+g3('day'); }
  return get('year') + '-' + get('month') + '-' + get('day');
}

function toggleOdds() {
  showOdds = !showOdds;
  document.getElementById('oddsToggle').classList.toggle('off', !showOdds);
  document.getElementById('oddsToggleLabel').textContent = showOdds ? '赔率' : '隐藏';
  document.querySelectorAll('.odds-th,.odds-cell').forEach(el => el.style.display = showOdds ? '' : 'none');
}

// =====================================================================
//  TOAST
// =====================================================================
function showToast(msg, t) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), t||2000);
}

// =====================================================================
//  DATE NAVIGATION
// =====================================================================
function changeDate(delta) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + delta);
  _collapseState._date = currentDate.toISOString();
  saveCollapseState();
  updateDatePicker();
  renderRecords();
  fetchData(currentDate);
}
function goToToday() {
  currentDate = new Date();
  _collapseState._date = currentDate.toISOString();
  saveCollapseState();
  updateDatePicker();
  loadScheduleData();
  renderRecords();
  fetchData(currentDate);
}
function updateDatePicker() {
  // Display Beijing date
  var f = new Intl.DateTimeFormat('en', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit' });
  var p = f.formatToParts(new Date(currentDate));
  var get = function(t) { return p.find(function(x) { return x.type === t; })?.value || '00'; };
  var el = document.getElementById('dateLabel');
  if (el) el.textContent = get('month') + '/' + get('day');
}

// =====================================================================
//  INIT
// =====================================================================
document.querySelectorAll('.odds-th,.odds-cell').forEach(el => el.style.display = 'none');
document.getElementById('oddsToggle').classList.add('off');
document.getElementById('oddsToggleLabel').textContent = '隐藏';
showOdds = false;
document.getElementById('tabRecords').classList.add('show');
updateDatePicker();
loadScheduleData();
// Restore saved date if it differs from today
if (_collapseState._date) { try { var sd = new Date(_collapseState._date); if (!isNaN(sd)) { var todayKey = fmtDateKey(new Date()); var savedKey = fmtDateKey(sd); if (savedKey !== todayKey) { var hasMatches = matches.some(function(m) { return fmtDateKey(m.displayDate||m.time) === savedKey; }); if (hasMatches) { currentDate = sd; updateDatePicker(); } } } } catch(e) {} }
renderRecords();
renderAnalysis();
applyCollapseState();
fetchData(currentDate);
// Auto-refresh every 60 seconds for latest scores
setInterval(function() { fetchData(currentDate); }, 60000);
</script>
</body>
</html>
