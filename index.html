<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞彩分析 · 世界杯</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
    --border: #30363d; --text: #e6edf3; --text2: #8b949e;
    --accent: #d4ad4a; --win: #3fb950; --loss: #f85149;
    --draw: #d29922; --blue: #58a6ff;
    --shadow: 0 2px 12px rgba(0,0,0,.4); --radius: 10px;
  }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC","Microsoft YaHei",sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px;
  }
  .container { max-width: 1460px; margin: 0 auto; }
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 18px; margin-bottom: 14px;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  header h1 span { color: var(--accent); }
  header .sub { color: var(--text2); font-size: .75rem; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; font-size: .8rem;
    background: #1a2e1a; color: var(--win); border: 1px solid #2d6a2d;
  }
  .status-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--win); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .status-badge.loading { opacity: .6; }
  .status-badge.error { background: #3a1a1a; color: var(--loss); border-color: #6a2d2d; }
  .status-badge.error .dot { background: var(--loss); }

  .grid { display: grid; grid-template-columns: 3.5fr 3.5fr; gap: 18px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface2); font-weight: 600; font-size: .9rem;
  }
  .card-header .badge {
    font-size: .7rem; font-weight: 400; background: #30363d;
    padding: 2px 10px; border-radius: 10px; color: var(--text2);
  }
  .card-body { padding: 12px 16px; }
  .card-body-sm { padding: 8px 16px; }

  .match-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
  .match-table th {
    text-align: left; padding: 7px 5px; border-bottom: 2px solid var(--border);
    color: var(--text2); font-weight: 500; font-size: .7rem; white-space: nowrap;
  }
  .match-table td { padding: 8px 5px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: .82rem; height: 38px; }
  .match-table tbody tr:last-child td { border-bottom: none; padding-bottom: 0; }
  .match-table tr:hover { background: rgba(88,166,255,.04); }
  .match-table tr.finished { opacity: .40; }
  .match-table tr.upcoming { opacity: .6; }
  .match-table tr.highlight { background: rgba(212,173,74,.06); }
  .match-table tr.selected { background: rgba(88,166,255,.08); }
  .team-name { font-weight: 600; display: flex; align-items: center; gap: 5px; color: inherit; }
  .team-name .flag { width: 18px; height: 13px; border-radius: 2px; flex-shrink: 0; }
  .vs { color: var(--text2); font-size: .7rem; text-align: center; }
  .time-col { color: var(--text2); font-size: .76rem; white-space: nowrap; }
  .odds-cell { text-align: center; }
  .odds-num {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: .8rem; font-weight: 600; color: var(--accent);
    background: rgba(212,173,74,.06);
  }
  .right-panel { position: sticky; top: 16px; align-self: start; }
  .odds-toggle {
    display: inline-flex; align-items: center; gap: 5px; cursor: pointer;
    font-size: .7rem; color: var(--text2); background: var(--surface2);
    border: 1px solid var(--border); padding: 3px 9px; border-radius: 12px;
    transition: all .15s; user-select: none;
  }
  .odds-toggle:hover { border-color: var(--accent); }
  .odds-toggle.off { opacity: .5; }
  .odds-toggle .indicator { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); transition: all .2s; }
  .odds-toggle.off .indicator { background: var(--text2); }

  /* Score display */
  .score-main { font-weight: 700; font-size: .9rem; }
  .score-ht { display: block; font-size: .62rem; color: var(--text2); margin-top: 1px; }
  .status-tag {
    display: inline-block; font-size: .6rem; padding: 1px 5px; border-radius: 3px;
    font-weight: 600; letter-spacing: .3px;
  }
  .status-tag.live { background: rgba(63,185,80,.15); color: var(--win); }
  .status-tag.ht   { background: rgba(210,153,34,.15); color: var(--draw); animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-tag.ft   { background: rgba(139,148,158,.15); color: var(--text2); }

  .bet-type-bar { display: flex; gap: 4px; margin: 8px 0 6px; flex-wrap: wrap; }
  .bet-type-btn {
    padding: 4px 11px; border-radius: 6px; font-size: .76rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); transition: all .15s; font-weight: 500;
  }
  .bet-type-btn:hover { border-color: var(--blue); color: var(--text); }
  .bet-type-btn.active { border-color: var(--accent); background: rgba(212,173,74,.12); color: var(--accent); }

  .bet-options { display: none; margin: 4px 0; }
  .bet-options.show { display: block; }
  .bet-opt-grid {
    display: flex; flex-wrap: wrap; gap: 3px;
    max-height: 145px; overflow-y: auto; padding: 3px 0;
  }
  .bet-opt-grid::-webkit-scrollbar { width: 4px; }
  .bet-opt-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .bet-opt-btn {
    padding: 3px 9px; border-radius: 5px; font-size: .74rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); transition: all .12s; font-weight: 500; white-space: nowrap;
  }
  .bet-opt-btn:hover { border-color: var(--blue); background: rgba(88,166,255,.08); }
  .bet-opt-btn.selected { border-color: var(--accent); background: rgba(212,173,74,.12); color: var(--accent); }

  .hc-bar { display: flex; gap: 3px; margin: 4px 0; flex-wrap: wrap; }
  .hc-btn {
    padding: 2px 9px; border-radius: 5px; font-size: .74rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); transition: all .12s;
  }
  .hc-btn:hover { border-color: var(--blue); color: var(--text); }
  .hc-btn.active { border-color: var(--accent); background: rgba(212,173,74,.12); color: var(--accent); }

  .bet-input-wrap { position: relative; }
  .bet-input-wrap input {
    width: 100%; padding: 8px 11px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: .86rem; outline: none; transition: border-color .2s;
  }
  .bet-input-wrap input:focus { border-color: var(--accent); }
  .bet-input-wrap input::placeholder { color: var(--text2); font-size: .8rem; }
  .bet-hint { font-size: .7rem; color: var(--text2); margin-top: 4px; line-height: 1.4; }
  .bet-hint kbd {
    display: inline-block; padding: 0 4px; border-radius: 3px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: .68rem; font-family: inherit; color: var(--text2);
  }
  /* Compact match list in bet panel */
  .match-list-compact { max-height: 260px; overflow-y: auto; margin: 6px 0 2px; }
  .match-list-compact::-webkit-scrollbar { width: 4px; }
  .match-list-compact::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .ml-item {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; cursor: pointer; border-radius: 5px;
    border: 1px solid transparent; margin-bottom: 2px;
    transition: all .12s; font-size: .8rem;
  }
  .ml-item:hover { background: var(--surface2); border-color: var(--border); }
  .ml-item.ml-selected { background: rgba(88,166,255,.08); border-color: var(--blue); }
  .ml-item.ml-hasbet { border-color: var(--accent); }
  .ml-item .ml-time { font-size: .65rem; color: var(--text2); width: 38px; flex-shrink: 0; }
  .ml-item .ml-teams { flex: 1; min-width: 0; display: flex; align-items: center; gap: 4px; }
  .ml-item .ml-teams .ml-team { font-weight: 600; font-size: .8rem; }
  .ml-item .ml-teams .ml-vs { color: var(--text2); font-size: .65rem; margin: 0 2px; }
  .ml-item .ml-score { font-size: .78rem; font-weight: 600; width: 32px; text-align: center; flex-shrink: 0; }
  .ml-item .ml-betdot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .ml-item .ml-arrow { color: var(--text2); font-size: .7rem; flex-shrink: 0; }
  .suggest-box {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 0 0 8px 8px; max-height: 170px; overflow-y: auto;
    display: none; box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }
  .suggest-box.show { display: block; }
  .suggest-item {
    padding: 6px 11px; cursor: pointer; font-size: .8rem;
    border-bottom: 1px solid var(--border); transition: background .1s;
  }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover, .suggest-item.active { background: var(--surface2); }

  .bet-slip-empty { text-align: center; padding: 14px; color: var(--text2); font-size: .83rem; }
  .bet-slip-empty .icon { font-size: 1.6rem; margin-bottom: 3px; opacity: .4; }
  .bet-item {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .8rem;
  }
  .bet-item:last-child { border-bottom: none; }
  .bet-item .match-info { flex: 1; min-width: 0; }
  .bet-item .match-info .teams { font-weight: 600; font-size: .78rem; }
  .bet-item .match-info .picks { font-size: .72rem; color: var(--accent); margin-top: 1px; display: flex; flex-wrap: wrap; gap: 3px; }
  .bet-item .match-info .picks .pick-tag {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    background: rgba(212,173,74,.1); font-size: .7rem;
  }
  .bet-item .del-btn {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: .95rem; padding: 2px 5px; border-radius: 4px; transition: .15s;
  }
  .bet-item .del-btn:hover { color: var(--loss); background: rgba(248,81,73,.1); }
  .bet-summary {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0 0; margin-top: 5px; border-top: 1px solid var(--border);
    font-size: .8rem;
  }
  .pass-group { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
  .pass-btn {
    padding: 3px 11px; border-radius: 6px; font-size: .76rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); transition: all .15s; font-weight: 500;
  }
  .pass-btn:hover { border-color: var(--blue); }
  .pass-btn.active { border-color: var(--accent); background: rgba(212,173,74,.12); color: var(--accent); }
  .pass-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* Stats for analysis panel - compact */
  .stats-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 6px; }
  .stat-card { background: var(--surface2); border-radius: 5px; padding: 7px 4px; text-align: center; border: 1px solid var(--border); }
  .stat-card .num { font-size: 1.15rem; font-weight: 700; line-height: 1.2; }
  .stat-card .num.green { color: var(--win); }
  .stat-card .num.red   { color: var(--loss); }
  .stat-card .num.gold  { color: var(--accent); }
  .stat-card .num.blue  { color: var(--blue); }
  .stat-card .num.white { color: var(--text); }
  .stat-card .label { font-size: .58rem; color: var(--text2); margin-top: 2px; white-space: nowrap; }

  .hitrate-ring { display: flex; align-items: center; gap: 20px; padding: 6px 0 10px; }
  .ring-container { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
  .ring-container svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-container .center-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-container .center-text .pct { font-size: 1.3rem; font-weight: 800; line-height: 1; }
  .ring-container .center-text .pct.green { color: var(--win); }
  .ring-container .center-text .pct.yellow{ color: var(--accent); }
  .ring-container .center-text .pct.red   { color: var(--loss); }
  .ring-container .center-text .sub { font-size: .58rem; color: var(--text2); margin-top: 2px; }

  .combo-list { max-height: 200px; overflow-y: auto; font-size: .76rem; }
  .combo-list::-webkit-scrollbar { width: 4px; }
  .combo-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .combo-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .74rem;
    border-radius: 3px;
  }
  .combo-row:last-child { border-bottom: none; }
  .combo-row.combo-hit { background: rgba(63,185,80,.06); }
  .combo-row.combo-miss { background: rgba(248,81,73,.04); }
  .combo-row.combo-wait { background: rgba(210,153,34,.04); }
  .combo-row .cr-info { flex: 1; min-width: 0; }
  .combo-row .cr-info .cr-picks { display: flex; flex-wrap: wrap; gap: 2px 6px; font-size: .74rem; }
  .combo-row .cr-info .cr-picks .cr-pick-correct { color: var(--win); font-weight: 600; }
  .combo-row .cr-info .cr-picks .cr-pick-wrong   { color: var(--loss); font-weight: 600; }
  .combo-row .cr-info .cr-picks .cr-pick-pending { color: var(--text2); }

  .btn-group { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .btn {
    padding: 6px 14px; border-radius: 6px; font-size: .8rem; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); transition: all .15s;
    background: var(--surface2); color: var(--text);
  }
  .btn:hover { border-color: var(--text2); }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary:hover { opacity: .9; }
  .btn-danger { color: var(--loss); border-color: var(--loss); background: transparent; }
  .btn-danger:hover { background: rgba(248,81,73,.1); }
  .btn-sm { padding: 4px 12px; font-size: .78rem; }

  .record-item {
    padding: 5px 0; font-size: .78rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  .record-item.has-detail { padding-bottom: 0; }
  .record-item .ri-detail-box { margin-top: 8px; padding: 6px 8px 12px; background: var(--surface2); border-radius: 6px; font-size: .74rem; border-bottom: 1px solid var(--border); width: 200px; box-sizing: border-box; }
  .record-item:last-child { border-bottom: none; }
  .record-item .ri-info { flex: 1; min-width: 0; }
  .record-item .ri-info .ri-label { font-weight: 600; font-size: .8rem; }
  .record-item .ri-info .ri-detail { color: var(--text2); font-size: .7rem; margin-top: 1px; }
  .record-item .ri-actions { display: flex; gap: 3px; flex-shrink: 0; }

  .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
  .tab-item {
    padding: 6px 12px; cursor: pointer; font-size: .78rem; font-weight: 500;
    color: var(--text2); border-bottom: 2px solid transparent; transition: all .15s;
    background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab-item:hover { color: var(--text); }
  .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.show { display: block; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 20px; font-size: .84rem;
    box-shadow: 0 4px 24px rgba(0,0,0,.6); opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .table-wrap { overflow-x: auto; }
  .empty-pad { text-align: center; padding: 16px; color: var(--text2); font-size: .8rem; }

  .save-dialog-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100;
    display: none; align-items: center; justify-content: center;
  }
  .save-dialog-overlay.show { display: flex; }
  .save-dialog {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px; width: 340px; max-width: 90%;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  .save-dialog h3 { margin-bottom: 10px; font-size: .95rem; }
  .save-dialog input {
    width: 100%; padding: 7px 11px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: .84rem; outline: none;
  }
  .save-dialog input:focus { border-color: var(--accent); }

  .combo-badge {
    display: inline-block; padding: 1px 7px; border-radius: 8px;
    background: rgba(88,166,255,.12); color: var(--blue);
    font-size: .7rem; font-weight: 600;
  }

  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .right-panel { position: static; } .stats-grid { grid-template-columns: repeat(3,1fr); } }
  @media (max-width: 500px) { body { padding: 6px; } .card-body { padding: 8px; } .stats-grid { grid-template-columns: repeat(2,1fr); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .noscroll { overflow: hidden; }
</style>
</head>
<body>

<div class="container">

<header>
  <div>
    <h1>⚽ <span>世界杯</span>竞彩分析</h1>
    <div class="sub">ESPN 实时数据 · 半场比分 · 复式投注 · 命中率计算</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <div class="status-badge" id="statusBadge">
      <span class="dot"></span>
      <span id="updateTime">加载中…</span>
    </div>
    <button class="btn" onclick="fetchData(currentDate)" style="padding:5px 16px;font-size:.85rem;font-weight:700;">⟳ 刷新</button>
  </div>
</header>

<div class="grid">

  <!-- ===== LEFT COLUMN ===== -->
  <div class="left-col">

    <!-- Match Table -->
    <div class="card">
      <div class="card-header">
        <span>🏆 世界杯赛程</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="display:flex;align-items:center;gap:4px;font-size:.72rem;">
            <button class="btn btn-sm" onclick="changeDate(-1)" style="padding:2px 7px;">‹</button>
            <span style="font-size:.78rem;font-weight:600;min-width:60px;text-align:center;" id="dateLabel"></span>
            <button class="btn btn-sm" onclick="changeDate(1)" style="padding:2px 7px;">›</button>
            <button class="btn btn-sm" onclick="goToToday()" style="padding:2px 7px;font-size:.65rem;">今天</button>
          </div>
          <span class="badge" id="matchCount">—</span>
          <div class="odds-toggle" id="oddsToggle" onclick="toggleOdds()">
            <span class="indicator"></span>
            <span id="oddsToggleLabel">赔率</span>
          </div>
        </div>
      </div>
      <div class="card-body" style="padding-bottom:16px;">
        <div class="table-wrap">
          <table class="match-table" id="matchTable">
            <thead>
              <tr>
                <th style="width:48px;">时间</th>
                <th>组别</th>
                <th>主队</th>
                <th style="width:20px;text-align:center;"></th>
                <th>客队</th>
                <th style="width:60px;text-align:center;">比分</th>
                <th style="width:20px;text-align:center;"></th>
                <th style="width:44px;text-align:center;" class="odds-th">胜</th>
                <th style="width:44px;text-align:center;" class="odds-th">平</th>
                <th style="width:44px;text-align:center;" class="odds-th">负</th>
              </tr>
            </thead>
            <tbody id="matchBody"></tbody>
          </table>
        </div>
        <div id="matchEmpty" class="empty-pad" style="display:none;">
          <div style="font-size:1.3rem;margin-bottom:4px;">🏆</div>
          <div id="matchEmptyMsg">加载比赛数据…</div>
        </div>
      </div>
    </div>

    <!-- Bet Input -->
    <div class="card">
      <div class="card-header" onclick="toggleCollapse('betInput')" style="cursor:pointer;">
        <span>✏️ 选比赛 + 投注 <span id="betInputIcon" style="color:var(--text2);font-size:.7rem;">▼</span></span>
        <span class="badge">可多选</span>
      </div>
      <div class="card-body bet-input-wrap" id="betInputBody">
        <input type="text" id="betInput" placeholder="点击下方赛事 或 搜索球队名" autocomplete="off" spellcheck="false">

function cnName(en) {
  if (!en) return en;
  if (TEAM_CN[en]) return TEAM_CN[en];
  // Try common abbreviations and suffixes
  const cleaned = en.replace(/^(FC|Club)\s*/i, '').replace(/\s*(FC|Club)$/i, '');
  if (TEAM_CN[cleaned]) return TEAM_CN[cleaned];
  // Try matching parts
  for (const p of en.split(/[\s,.-]+/)) {
    const key = p.trim();
    if (key && TEAM_CN[key]) return TEAM_CN[key];
  }
  // Try matching the full name case-insensitively
  const lower = en.toLowerCase();
  for (const [key, val] of Object.entries(TEAM_CN)) {
    if (key.toLowerCase() === lower) return val;
  }
  return en;
}

async function fetchData(date) {
  const badge = document.getElementById('statusBadge');
  const timeEl = document.getElementById('updateTime');
  badge.className = 'status-badge loading';
  timeEl.textContent = '请求中…';

  // Build URL
  const targetDate = date || currentDate;
  const dateStr = targetDate.getFullYear().toString() +
    String(targetDate.getMonth()+1).padStart(2,'0') +
    String(targetDate.getDate()).padStart(2,'0');
  const API = `${API_BASE}?dates=${dateStr}`;
  let lastErr;

  const proxies = [
    null,
    'https://api.allorigins.win/raw?url=',
    'https://api.allorigins.win/get?url=',
    'https://corsproxy.io/?url=',
    'https://corsproxy.io/?',
    'https://thingproxy.freeboard.io/fetch/',
  ];
  for (const proxy of proxies) {
    try {
      const fullUrl = proxy ? proxy + encodeURIComponent(API) : API;
      const r = await fetch(fullUrl, { signal: AbortSignal.timeout(10000) });
      if (!r.ok) throw Error(`HTTP ${r.status}`);
      const text = await r.text();
      if (!text || text.length < 50) throw Error('响应过短');
      let data;
      try { data = JSON.parse(text); }
      catch(e) {
        const w = JSON.parse(text);
        if (w?.contents) data = typeof w.contents === 'string' ? JSON.parse(w.contents) : w.contents;
        else if (w?.data) data = w.data;
        else throw Error('JSON格式错误');
      }
      if (data && data.events && data.events.length > 0) {
        console.log(`✅ ${proxy||'直连'}: ${data.events.length} 场`);
        processScoreboard(data);
        return;
      }
      if (data && data.events) throw Error('当天无赛事');
      throw Error('无效响应');
    } catch(e) { lastErr = e; console.warn(`❌ ${proxy||'直连'}: ${e.message}`); }
  }
  badge.className='status-badge error';
  timeEl.textContent='获取失败';
  document.getElementById('matchCount').textContent='错误';
  document.getElementById('matchBody').innerHTML='';
  document.getElementById('matchEmpty').style.display='block';
  document.getElementById('matchEmptyMsg').textContent=`⚠️ 无法获取数据: ${lastErr?.message||'未知错误'}`;
}

function processScoreboard(data) {
  const badge = document.getElementById('statusBadge');
  const timeEl = document.getElementById('updateTime');

  const raw = data.events;
  const processed = [];

  for (const ev of raw) {
    const c=ev.competitions?.[0]||{}, s=c.status||{}, st=s.type?.state||'pre';
    const fin=st==='post', liv=st==='in';
    const cs=c.competitors||[], h=cs.find(x=>x.homeAway==='home'), a=cs.find(x=>x.homeAway==='away');
    const hs=h?.score??'-', as_=a?.score??'-';
    const he=h?.team?.displayName||h?.team?.name||'?', ae=a?.team?.displayName||a?.team?.name||'?';
    const oo=c.odds?.[0]?.moneyline||null;
    let od={3:null,1:null,0:null};
    if (oo) { od[3]=amD(oo.home?.current?.odds); od[1]=amD(oo.draw?.current?.odds); od[0]=amD(oo.away?.current?.odds); }

    const statusName = s.type?.name || '';
    const isHT = statusName === 'STATUS_HALFTIME';
    const displayClock = s.displayClock || '';

    let result = null;
    if (fin) { const sh=parseInt(hs),sa=parseInt(as_); if(!isNaN(sh)&&!isNaN(sa)) result=sh>sa?'3':(sh<sa?'0':'1'); }

    let htResult = null, htScoreStr = null, _htConfirmed = false;

    // Source A: linescores period-by-period (most reliable)
    if (h?.linescores?.length && a?.linescores?.length) {
      const hL = h.linescores.map(l => parseInt(l.value)).filter(v => !isNaN(v));
      const aL = a.linescores.map(l => parseInt(l.value)).filter(v => !isNaN(v));
      if (hL.length > 0 && aL.length > 0) {
        htScoreStr = `${hL[0]}-${aL[0]}`;
        htResult = hL[0] > aL[0] ? '3' : (hL[0] < aL[0] ? '0' : '1');
        _htConfirmed = true;
      }
    }

    // Source B: parse play-by-play Goal events from competition details
    if (!_htConfirmed && c.details && Array.isArray(c.details) && c.details.length) {
      const info = extractHTfromDetails(c.details);
      if (info) { htResult=info.result; htScoreStr=info.scoreStr; _htConfirmed=true; }
    }

    // Source C: match is currently AT half-time → current score = HT score
    if (!_htConfirmed && isHT) {
      const sh=parseInt(hs), sa=parseInt(as_);
      if (!isNaN(sh)&&!isNaN(sa)) { htResult=sh>sa?'3':(sh<sa?'0':'1'); htScoreStr=`${hs}-${as_}`; _htConfirmed=true; }
    }

    // Source D: finished 0-0 must also be 0-0 at HT
    if (!_htConfirmed && fin && hs==='0' && as_==='0') { htResult='1'; htScoreStr='0-0'; _htConfirmed=true; }

    // Background fetch: for all finished matches still missing HT
    if (!_htConfirmed && fin) lazyFetchHT(ev.id);

    const gn=c.altGameNote||'', gm=gn.match(/Group\s+([A-Z])/), gl=gm?gm[1]+'组':'世界杯';

    processed.push({
      id:ev.id, group:gl, home:cnName(he), away:cnName(ae),
      homeEn:he, awayEn:ae,
      homeAbbr:h?.team?.abbreviation||'', awayAbbr:a?.team?.abbreviation||'',
      homeLogo:h?.team?.logo||'', awayLogo:a?.team?.logo||'',
      time:new Date(ev.date),
      status:fin?'finished':(liv?'live':'upcoming'), isHT, displayClock,
      homeScore:hs, awayScore:as_,
      odds:od, result, htResult, htScoreStr, _htConfirmed, displayDate: new Date(ev.date),
    });
  }

  matches = processed;
  badge.className='status-badge';
  const nn=new Date();
  timeEl.textContent=`${nn.getHours().toString().padStart(2,'0')}:${nn.getMinutes().toString().padStart(2,'0')}:${nn.getSeconds().toString().padStart(2,'0')}`;
  if (selectedMatchId&&!matches.find(m=>m.id===selectedMatchId)) clearSelectedMatch();
  renderAll();
  // Recalculate hit rate with fresh data if bets exist and analysis was done
  if (bets.length && analysisResult) calculateHitRate();
}

function extractHTfromDetails(details) {
  // Only reliable when details contains first-half Goal events
  let lastGoalBeforeHT = null;
  for (const d of details) {
    if (d.type?.text === 'Goal' && d.clock?.displayValue && d.score?.value) {
      const mins = parseInt(d.clock.displayValue.split(':')[0])||0;
      if (mins <= 45) lastGoalBeforeHT = d.score.value;
    }
  }
  if (lastGoalBeforeHT) {
    const parts=lastGoalBeforeHT.split('-'), sh=parseInt(parts[0]), sa=parseInt(parts[1]);
    if (!isNaN(sh)&&!isNaN(sa)) return { result: sh>sa?'3':(sh<sa?'0':'1'), scoreStr: lastGoalBeforeHT };
  }
  return null; // Can't determine from details alone
}

function amD(s) { if(!s)return null; const v=parseInt(s); return isNaN(v)?null:(v>0?+(v/100+1).toFixed(2):+(100/Math.abs(v)+1).toFixed(2)); }

// Background HT fetch — get event details with full play-by-play
const _htCache = {};
async function lazyFetchHT(eventId) {
  if (_htCache[eventId] !== undefined) return _htCache[eventId];
  _htCache[eventId] = null;
  for (const p of ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?']) {
    try {
      const r = await fetch(p+encodeURIComponent(`${EVENT_API}/${eventId}`), { signal: AbortSignal.timeout(8000) });
      if (!r.ok) throw Error();
      const text = await r.text();
      let data;
      try { data = JSON.parse(text); } catch(e) { const w=JSON.parse(text); data=JSON.parse(w.contents); }
      // Try to find half-time score from event details
      let info = null;
      const comp = data?.competitions?.[0];
      if (comp?.details) info = extractHTfromDetails(comp.details);
      if (!info && data?.header?.competitions?.[0]?.details) info = extractHTfromDetails(data.header.competitions[0].details);
      if (!info) {
        // Check linescores as last resort
        const cs = comp?.competitors || [];
        const h2=cs.find(x=>x.homeAway==='home'), a2=cs.find(x=>x.homeAway==='away');
        if (h2?.linescores?.length && a2?.linescores?.length) {
          const sH=parseInt(h2.linescores[0].value), sA=parseInt(a2.linescores[0].value);
          if (!isNaN(sH)&&!isNaN(sA)) info={result:sH>sA?'3':(sH<sA?'0':'1'), scoreStr:`${sH}-${sA}`};
        }
      }
      _htCache[eventId] = info||null;
      if (info) { const m=matches.find(x=>x.id===eventId); if(m){m.htResult=info.result;m.htScoreStr=info.scoreStr;m._htConfirmed=true;renderMatches();if(bets.length&&analysisResult)calculateHitRate();} }
      return info;
    } catch(e) { /* try next proxy */ }
  }
  _htCache[eventId] = null;
  return null;
}

function getCombinations(betList, pass) {
  const groups = new Map();
  betList.forEach(b => { if (!groups.has(b.matchId)) groups.set(b.matchId, []); groups.get(b.matchId).push(b); });
  const mIds = [...groups.keys()];
  if (mIds.length === 0) return [];
  if (pass === 'single') return betList.map(b => [b]);
  const minM = pass === 'mixed' ? 2 : (parseInt(pass) || 2);
  if (mIds.length < minM) return [];
  function pick(idx, sel) {
    if (sel.length === minM) {
      let combos = [[]];
      sel.forEach(mid => {
        const opts = groups.get(mid);
        const next = [];
        combos.forEach(c => { opts.forEach(o => next.push([...c, o])); });
        combos = next;
      });
      return combos;
    }
    if (idx >= mIds.length) return [];
    return pick(idx+1, [...sel, mIds[idx]]).concat(pick(idx+1, sel));
  }
  return pick(0, []);
}

  const el=document.getElementById('passGroup');
  const n=[...new Set(bets.map(b=>b.matchId))].length;
  el.innerHTML=PASS_OPTS.map(o=>{const dis=n<o.min;const act=passType===o.id?'active':'';return `<button class="pass-btn ${act}" ${dis?'disabled':''} onclick="setPassType('${o.id}')">${o.label}</button>`;}).join('');
}
function setPassType(id) { passType=id; renderBetSlip(); if(analysisResult)calculateHitRate(); }
function clearBets() { bets=[]; analysisResult=null; renderMatches(); renderBetSlip(); renderBetOptions(); renderAnalysis(); showToast('已清空'); }

// =====================================================================
//  ANALYSIS
// =====================================================================
function calculateHitRate() {
  if (!bets.length) { showToast('请先添加投注'); return; }
  const combos = getCombinations(bets, passType);
  if (!combos.length) { showToast('所选场次不足', 1500); return; }
  const mIds = [...new Set(bets.map(b=>b.matchId))];
  const passOpt = PASS_OPTS.find(o => o.id === passType);
  if (passOpt && mIds.length < passOpt.min) { showToast(`${passOpt.label} 至少需 ${passOpt.min} 场`, 1500); return; }

  const evaluated = combos.map(combo => {
    const results = combo.map(b => {
      const m = getMatch(b.matchId); if (!m) return { label: b.label, status: 'pending' };
      const eff = getEffScores(b.matchId);
      const bt = BT[b.betType];
      let status = 'pending';
      const isResolved = eff._manual || m.status === 'finished';
      if (isResolved) {
        if (eff.result === null) status = 'pending';
        else status = bt.hit(b.pick, eff.result, { ...m, ...eff }, b.handicap) ? 'correct' : 'wrong';
      }
      // For 半全场, add per-part status
      let parts = null;
      if (b.betType === 'bqc' && isResolved && eff.htResult && eff.result) {
        const p0 = b.pick[0], p1 = b.pick[1];
        parts = [
          { text: PICK_LABEL[p0]||p0, status: p0 === eff.htResult ? 'correct' : 'wrong' },
          { text: PICK_LABEL[p1]||p1, status: p1 === eff.result  ? 'correct' : 'wrong' },
        ];
      }
      return { match: m, label: `${m.home} ${b.label}`, status, parts };
    });
    const allC = results.every(r => r.status === 'correct');
    const anyW = results.some(r => r.status === 'wrong');
    return { combo: results, status: allC ? 'correct' : (anyW ? 'wrong' : 'pending') };
  });

  const total = evaluated.length, correct = evaluated.filter(e=>e.status==='correct').length;
  const wrong = evaluated.filter(e=>e.status==='wrong').length, pending = evaluated.filter(e=>e.status==='pending').length;
  const resolved = correct + wrong;
  const hitRate = resolved > 0 ? (correct / resolved * 100) : 0;

  analysisResult = { total, correct, wrong, pending, resolved, hitRate, evaluated };
  renderAnalysis();
  document.getElementById('analysisBadge').textContent = `${correct}/${resolved} 命中`;
  if (correct > 0) showToast(`🎉 ${correct}/${resolved} 注命中！`, 2000);
  else if (wrong > 0 && pending === 0) showToast(`😢 未命中`, 1500);
  else showToast(`📊 计算完成`, 1000);
}

function renderAnalysis() {
  const el = document.getElementById('tabAnalysis');
  if (!analysisResult) {
    el.innerHTML = `<div class="empty-pad"><div style="font-size:1.4rem;margin-bottom:4px;">📈</div><div>添加投注后点击「计算」</div></div>`;
    return;
  }
  const r = analysisResult;
  const pct = r.resolved > 0 ? (r.correct / r.resolved * 100) : 0;
  const radius = 38, circ = 2 * Math.PI * radius;
  const offset = circ - (pct / 100) * circ;
  const pctColor = pct >= 70 ? 'green' : (pct >= 40 ? 'yellow' : 'red');

  const maxShow = 30;
  const comboRows = r.evaluated.slice(0, maxShow).map(e => {
    const rowClass = e.status === 'correct' ? 'combo-hit' : (e.status === 'wrong' ? 'combo-miss' : 'combo-wait');
    const picksHtml = e.combo.map(p => {
      if (p.parts) {
        // 半全场: render HT and FT parts individually
        return p.parts.map(pt => {
          const cls = pt.status === 'correct' ? 'cr-pick-correct' : (pt.status === 'wrong' ? 'cr-pick-wrong' : 'cr-pick-pending');
          return `<span class="${cls}">${pt.text}</span>`;
        }).join('<span style="color:var(--text2);margin:0 1px;">-</span>');
      }
      const cls = p.status === 'correct' ? 'cr-pick-correct' : (p.status === 'wrong' ? 'cr-pick-wrong' : 'cr-pick-pending');
      return `<span class="${cls}">${p.label}</span>`;
    }).join('');
    return `<div class="combo-row ${rowClass}"><span class="cr-info"><span class="cr-picks">${picksHtml}</span></span><span style="font-size:.72rem;font-weight:600;text-align:right;min-width:64px;color:${e.status==='correct'?'var(--win)':(e.status==='wrong'?'var(--loss)':'var(--text2)')};">${e.status==='correct'?'✓ 命中':(e.status==='wrong'?'✗ 未中':'⏳ 待定')}</span></div>`;
  }).join('');
  const more = r.evaluated.length > maxShow ? `<div style="text-align:center;color:var(--text2);font-size:.7rem;padding:3px 0;">… 还有 ${r.evaluated.length - maxShow} 注</div>` : '';

  el.innerHTML = `
    <div class="hitrate-ring">
      <div class="ring-container">
        <svg viewBox="0 0 88 88">
          <circle cx="44" cy="44" r="${radius}" fill="none" stroke="var(--border)" stroke-width="6"/>
          <circle cx="44" cy="44" r="${radius}" fill="none" stroke="currentColor" stroke-width="6"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
            style="color:${pctColor==='green'?'var(--win)':pctColor==='yellow'?'var(--accent)':'var(--loss)'};transition:stroke-dashoffset .6s ease;"/>
        </svg>
        <div class="center-text"><div class="pct ${pctColor}">${pct.toFixed(1)}%</div><div class="sub">已结束命中率</div></div>
      </div>
      <div style="flex:1;">
        <div class="stats-grid">
          <div class="stat-card"><div class="num gold">${r.total}</div><div class="label">总注</div></div>
          <div class="stat-card"><div class="num green">${r.correct}</div><div class="label">中</div></div>
          <div class="stat-card"><div class="num red">${r.wrong}</div><div class="label">未中</div></div>
          <div class="stat-card"><div class="num blue">${r.pending}</div><div class="label">待定</div></div>
          <div class="stat-card"><div class="num white">${r.resolved}</div><div class="label">已结束</div></div>
          <div class="stat-card"><div class="num ${r.correct>0?'green':'red'}">${r.correct>0?'✅':'❌'}</div><div class="label">中奖</div></div>
        </div>
      </div>
    </div>
    <div class="combo-list">
      ${comboRows}${more}
    </div>`;
}

function showSaveDialog() {
  if (!bets.length) { showToast('投注单为空', 1500); return; }
  const mIds = [...new Set(bets.map(b=>b.matchId))];
  const c = getCombinations(bets, passType);
  document.getElementById('saveLabel').value = '';
  document.getElementById('saveSummary').textContent = `${mIds.length} 场 · ${c.length} 注 · ${passType}`;
  document.getElementById('saveDialog').classList.add('show');
  setTimeout(() => document.getElementById('saveLabel').focus(), 100);
}
function closeSaveDialog() { document.getElementById('saveDialog').classList.remove('show'); }
function confirmSave() {
  const label = document.getElementById('saveLabel').value.trim() || `投注单 ${new Date().toLocaleString('zh-CN')}`;
  savedRecords.unshift({ id:Date.now(), label, time:new Date().toISOString(), bets:JSON.parse(JSON.stringify(bets)), passType });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(savedRecords)); } catch(e) {}
  closeSaveDialog(); renderRecords(); showToast(`✅ 已保存「${label}」`);
}
function deleteRecord(id) {
  savedRecords = savedRecords.filter(r => r.id !== id);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(savedRecords)); } catch(e) {}
  renderRecords(); showToast('已删除');
}
function loadRecord(record) {
  bets = JSON.parse(JSON.stringify(record.bets));
  passType = record.passType;
  analysisResult = null;
  clearSelectedMatch();
  renderAll();
  // Auto-calculate hit rate with current live data
  calculateHitRate();
  switchTab('analysis', document.querySelector('.tab-item'));
  showToast(`已加载「${record.label}」，已自动计算实时命中率`);
}

function renderRecords() {
  const el = document.getElementById('tabRecords');
  const navEl = document.getElementById('recordsDateNav');
  if (!savedRecords.length) {
    navEl.style.display = 'none';
    el.innerHTML = `<div class="empty-pad"><div style="font-size:1.3rem;margin-bottom:4px;">📋</div><div>暂无保存记录</div></div>`;
    return;
  }
  // Init records date
  if (!el._recordsDate) {
    const dc = new Map();
    savedRecords.forEach(r => r.bets.forEach(b => { const m=getMatch(b.matchId); if(m){const k=fmtDateKey(m.time);dc.set(k,(dc.get(k)||0)+1);} }));
    let bk=null,bc=0; dc.forEach((c,k)=>{if(c>bc){bc=c;bk=k;}});
    el._recordsDate = bk || fmtDateKey(new Date());
  }
  const rd = el._recordsDate;
  // Filter by match date
  const filtered = savedRecords.filter(r => r.bets.some(b => { const m=getMatch(b.matchId); return m && fmtDateKey(m.time)===rd; }));
  // Per-date expand/collapse
  if (!el._expandedByDate) el._expandedByDate = {};
  const expanded = el._expandedByDate[rd] !== false;
  // Populate nav in tab-bar
  navEl.style.display = 'inline-flex';
  navEl.innerHTML = `
    <button class="btn btn-sm" onclick="recordsChangeDate(-1)" style="padding:1px 6px;">‹</button>
    <span style="font-weight:600;">${rd.replace(/-/g,'/')}</span>
    <button class="btn btn-sm" onclick="recordsChangeDate(1)" style="padding:1px 6px;">›</button>
    <button class="btn btn-sm" onclick="recordsGoToday()" style="padding:1px 6px;font-size:.65rem;">今天</button>
    ${filtered.length > 1 ? `<button class="btn btn-sm" onclick="toggleRecordsDate()" style="padding:1px 6px;font-size:.65rem;">${expanded ? '📕' : '📖'}</button>` : ''}
  `;
  if (!filtered.length) { el.innerHTML=`<div class="empty-pad"><div style="font-size:1.3rem;margin-bottom:4px;">📋</div><div>该日无投注记录</div></div>`; return; }
  let html = '';
  filtered.forEach(r => {
    const mIds = [...new Set(r.bets.map(b=>b.matchId))];
    const sk = rd+'_'+r.id;
    if (!el._singleExpanded) el._singleExpanded = {};
    const isExpanded = el._singleExpanded[sk] !== undefined ? el._singleExpanded[sk] : expanded;
    const recSt = calcRecordHitStatus(r);
    let stBadge = '';
    if (recSt === 'correct') stBadge = `<span style="font-size:.65rem;font-weight:600;color:var(--win);padding:1px 6px;border-radius:4px;background:rgba(63,185,80,.12);">✓ 中</span>`;
    else if (recSt === 'wrong') stBadge = `<span style="font-size:.65rem;font-weight:600;color:var(--loss);padding:1px 6px;border-radius:4px;background:rgba(248,81,73,.1);">✗ 未中</span>`;
    const matchTimes = [...new Set(r.bets.map(b=>{const m=getMatch(b.matchId);return m?fmtTimeCompact(m.time):null;}).filter(Boolean))].join(', ');
    let detailHtml = '';
    if (isExpanded) {
      const bg = new Map();
      r.bets.forEach(b => {if(!bg.has(b.matchId))bg.set(b.matchId,[]);bg.get(b.matchId).push(b);});
      detailHtml = '<div class="ri-detail-box">';
      bg.forEach((picks, mid) => {
        const m = getMatch(mid);
        const ml = m ? `${m.home} VS ${m.away}` : mid;
        const ss = m && m.status === 'finished' ? ` ${m.homeScore}:${m.awayScore}` : '';
        // Build context info (only for finished/live matches)
        const betTypes = [...new Set(picks.map(b=>b.betType))];
        const eff = m ? getEffScores(m.id) : null;
        let ctxHtml = '';
        if (m && m.status !== 'upcoming' && eff) {
          betTypes.forEach(btId => {
          if (!eff) return;
          if (btId === 'rqspf') {
            const hc = picks.find(b=>b.betType==='rqspf')?.handicap ?? 0;
            const ftH = parseInt(eff.homeScore), ftA = parseInt(eff.awayScore);
            if (!isNaN(ftH) && !isNaN(ftA)) {
              const adjH = ftH + hc, adjA = ftA;
              ctxHtml += (adjH > adjA ? '胜' : (adjH < adjA ? '负' : '平')) + ' ';
            }
          } else if (btId === 'zjq') {
            const total = (parseInt(eff.homeScore)||0) + (parseInt(eff.awayScore)||0);
            ctxHtml += `${total}球 `;
          } else if (btId === 'bqc') {
            const htLabel = eff.htResult ? ({'3':'胜','1':'平','0':'负'}[eff.htResult]||'?') : '?';
            const ftLabel = eff.result ? ({'3':'胜','1':'平','0':'负'}[eff.result]||'?') : '?';
            ctxHtml += `${htLabel}-${ftLabel} `;
          }
        });
        }
        detailHtml += `<div style="margin-top:12px;margin-bottom:2px;font-weight:600;font-size:.76rem;display:flex;justify-content:space-between;align-items:center;">
          <span>${ml}</span>
          <span style="color:var(--text2);font-weight:400;font-size:.7rem;text-align:right;flex-shrink:0;display:flex;align-items:center;gap:8px;"><span>${ss}</span>${ctxHtml?`<span>${ctxHtml.trim()}</span>`:''}</span>
        </div>`;
        picks.forEach(b => {
          const bt = BT[b.betType];
          let cls='cr-pick-pending',label=b.label,stT='⏳ 待定',stC='var(--text2)';
          const eff = m ? getEffScores(m.id) : null;
          const isDone = eff && (eff._manual || m.status === 'finished');
          if (isDone) {
            const hit = bt ? bt.hit(b.pick, eff.result, {...m, ...eff}, b.handicap) : false;
            cls = hit ? 'cr-pick-correct' : 'cr-pick-wrong'; stT = hit ? '✓ 命中' : '✗ 未中'; stC = hit ? 'var(--win)' : 'var(--loss)';
          }
          detailHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:.74rem;"><span><span style="color:var(--text2);font-size:.7rem;">[${bt?.label||b.betType}]</span> <span class="${cls}">${label}</span></span><span style="font-size:.7rem;font-weight:600;color:${stC};">${stT}</span></div>`;
        });
      });
      detailHtml += `</div>`;
    }
    html += `<div class="record-item${isExpanded?' has-detail':''}" style="flex-wrap:wrap;">
      <div class="ri-info" onclick="toggleRecordDetail(${r.id})" style="cursor:pointer;">
        <div class="ri-label">${r.label} <span style="color:var(--text2);font-size:.65rem;">${isExpanded?'▲':'▼'}</span></div>
        <div class="ri-detail">${matchTimes} · ${mIds.length} 场 · ${r.passType}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;min-width:120px;justify-content:flex-end;">${stBadge}
        <button class="btn btn-sm" onclick="event.stopPropagation();loadRecord(savedRecords.find(x=>x.id===${r.id}))" title="加载">⬆</button>
        <button class="btn btn-sm" onclick="event.stopPropagation();deleteRecord(${r.id})" title="删除" style="color:var(--loss);">✕</button>
      </div>
      ${isExpanded ? detailHtml : ''}
    </div>`;
  });
  el.innerHTML = html;
}

function calcRecordHitStatus(record) {
  const byMatch = new Map();
  record.bets.forEach(b => {if(!byMatch.has(b.matchId))byMatch.set(b.matchId,[]);byMatch.get(b.matchId).push(b);});
  const total = byMatch.size; let dead=0, resolved=0;
  byMatch.forEach((picks,mid) => {
    const eff = getEffScores(mid);
    if (!eff || (!eff._manual && (!getMatch(mid) || getMatch(mid).status !== 'finished' || getMatch(mid).result === null))) return;
    resolved++;
    const m = getMatch(mid) || {};
    const ok = picks.some(b => { const bt=BT[b.betType]; return bt ? bt.hit(b.pick, eff.result, {...m, ...eff}, b.handicap) : false; });
    if (!ok) dead++;
  });
  let need = total;
  if (record.passType !== 'single' && record.passType !== 'mixed') { const n=parseInt(record.passType); if(!isNaN(n)) need=n; }
  // 单关: 只要有任意一场命中就算中
  if (record.passType === 'single') {
    const hasCorrect = (resolved > 0 && dead < resolved);
    if (hasCorrect && resolved === total) return 'correct';
    if (dead === resolved) return 'wrong';
    return null;
  }
  if (total - dead < need) return 'wrong';
  if (resolved === total) return 'correct';
  return null;
}

function toggleRecordDetail(id) {
  const el = document.getElementById('tabRecords');
  if (!el._singleExpanded) el._singleExpanded = {};
  const k = el._recordsDate + '_' + id;
  el._singleExpanded[k] = !el._singleExpanded[k];
  renderRecords();
}

function recordsChangeDate(delta) {
  const el = document.getElementById('tabRecords');
  const d = new Date(el._recordsDate); d.setDate(d.getDate()+delta);
  el._recordsDate = fmtDateKey(d);
  renderRecords();
}
function recordsGoToday() {
  const el = document.getElementById('tabRecords');
  el._recordsDate = fmtDateKey(new Date());
  renderRecords();
}
function toggleRecordsDate() {
  const el = document.getElementById('tabRecords');
  if (!el._expandedByDate) el._expandedByDate = {};
  el._expandedByDate[el._recordsDate] = !(el._expandedByDate[el._recordsDate] !== false);
  renderRecords();
}
function fmtDateKey(d) {
  // Shift early morning matches (midnight-6am) to previous day for display
  const shifted = new Date(d);
  shifted.setHours(shifted.getHours() - 6);
  return `${shifted.getFullYear()}-${String(shifted.getMonth()+1).padStart(2,'0')}-${String(shifted.getDate()).padStart(2,'0')}`;
}

// =====================================================================
//  TABS
// =====================================================================
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('show'));
  btn.classList.add('active');
  const id = 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1);
  document.getElementById(id).classList.add('show');
  if (tab === 'records') {
    document.getElementById('recordsDateNav').style.display = 'inline-flex';
    renderRecords();
  } else {
    document.getElementById('recordsDateNav').style.display = 'none';
    if (tab === 'analysis' && analysisResult) renderAnalysis();
  }
}

// Collapse state for betInput/betSlip (persisted in localStorage)
let _collapseState = {};
try { const d = localStorage.getItem('odds_collapse'); if (d) _collapseState = JSON.parse(d); } catch(e) {}
function saveCollapseState() { try { localStorage.setItem('odds_collapse', JSON.stringify(_collapseState)); } catch(e) {} }
function toggleCollapse(name) {
  _collapseState[name] = !_collapseState[name];
  saveCollapseState();
  const body = document.getElementById(name + 'Body');
  const icon = document.getElementById(name + 'Icon');
  if (body) body.style.display = _collapseState[name] ? 'none' : '';
  if (icon) icon.textContent = _collapseState[name] ? '▶' : '▼';
}
function applyCollapseState() {
  ['betInput','betSlip'].forEach(name => {
    if (_collapseState[name]) {
      const body = document.getElementById(name + 'Body');
      const icon = document.getElementById(name + 'Icon');
      if (body) body.style.display = 'none';
      if (icon) icon.textContent = '▶';
    }
  });
}
